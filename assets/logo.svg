<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27"/>
      <stop offset="100%" style="stop-color:#0d1528"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#00b8d4"/>
    </linearGradient>
    <linearGradient id="amberGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb300"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowStrong">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)"/>

  <!-- Grid lines -->
  <g opacity="0.04" stroke="#00f0ff">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Device body -->
  <g transform="translate(140, 120)">
    <!-- Device body - Cardputer shape -->
    <rect x="0" y="0" width="420" height="260" rx="16" ry="16" fill="#1a1a2e" stroke="#00f0ff" stroke-width="2" opacity="0.9"/>

    <!-- Screen bezel -->
    <rect x="20" y="18" width="380" height="120" rx="6" ry="6" fill="#0d1117" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>

    <!-- Screen content - code/matrix lines -->
    <g opacity="0.5">
      <text x="40" y="48" font-family="monospace" font-size="11" fill="#00f0ff">> advdeck init --project</text>
      <text x="40" y="66" font-family="monospace" font-size="11" fill="#00b8d4">[✓] SD mounted</text>
      <text x="40" y="84" font-family="monospace" font-size="11" fill="#ffb300">[⟳] Bridge ready</text>
      <text x="40" y="102" font-family="monospace" font-size="11" fill="#00f0ff">> task: "Build pocket AI planner"</text>
      <text x="40" y="120" font-family="monospace" font-size="11" fill="#666">_</text>
    </g>

    <!-- Keyboard -->
    <g transform="translate(20, 155)" opacity="0.35">
      <!-- Row 1 -->
      <g>
        <rect x="0" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="25" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="50" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="75" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="100" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="125" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="150" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="175" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="200" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="225" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="250" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="275" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="300" y="0" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="325" y="0" width="35" height="16" rx="2" fill="#ffb300"/>
      </g>
      <!-- Row 2 -->
      <g>
        <rect x="0" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="25" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="50" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="75" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="100" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="125" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="150" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="175" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="200" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="225" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="250" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="275" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="300" y="20" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="325" y="20" width="35" height="16" rx="2" fill="#ffb300"/>
      </g>
      <!-- Row 3 -->
      <g>
        <rect x="0" y="40" width="35" height="16" rx="2" fill="#00f0ff"/>
        <rect x="38" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="63" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="88" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="113" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="138" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="163" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="188" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="213" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="238" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="263" y="40" width="22" height="16" rx="2" fill="#00f0ff"/>
        <rect x="288" y="40" width="55" height="16" rx="2" fill="#ffb300"/>
      </g>
      <!-- Row 4 - spacebar -->
      <g>
        <rect x="60" y="60" width="240" height="16" rx="2" fill="#00f0ff" opacity="0.5"/>
      </g>
    </g>
  </g>

  <!-- Neural/glow lines above device - brain node network -->
  <g filter="url(#glowStrong)">
    <!-- Central brain node cluster -->
    <circle cx="530" cy="140" r="8" fill="#00f0ff" opacity="0.9"/>
    <circle cx="490" cy="120" r="5" fill="#00f0ff" opacity="0.7"/>
    <circle cx="570" cy="120" r="5" fill="#00f0ff" opacity="0.7"/>
    <circle cx="510" cy="100" r="6" fill="#ffb300" opacity="0.7"/>
    <circle cx="550" cy="100" r="6" fill="#ffb300" opacity="0.7"/>
    <circle cx="530" cy="80" r="4" fill="#00f0ff" opacity="0.5"/>
    <circle cx="580" cy="150" r="4" fill="#00f0ff" opacity="0.5"/>
    <circle cx="480" cy="150" r="4" fill="#00f0ff" opacity="0.5"/>
    <circle cx="560" cy="170" r="3" fill="#ffb300" opacity="0.4"/>
    <circle cx="500" cy="170" r="3" fill="#ffb300" opacity="0.4"/>

    <!-- Neural edges -->
    <line x1="530" y1="140" x2="490" y2="120" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="530" y1="140" x2="570" y2="120" stroke="#00f0ff" stroke-width="1.5" opacity="0.6"/>
    <line x1="490" y1="120" x2="510" y2="100" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <line x1="570" y1="120" x2="550" y2="100" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <line x1="510" y1="100" x2="530" y2="80" stroke="#ffb300" stroke-width="1" opacity="0.4"/>
    <line x1="550" y1="100" x2="530" y2="80" stroke="#ffb300" stroke-width="1" opacity="0.4"/>
    <line x1="530" y1="140" x2="480" y2="150" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <line x1="530" y1="140" x2="580" y2="150" stroke="#00f0ff" stroke-width="1" opacity="0.4"/>
    <line x1="490" y1="120" x2="480" y2="150" stroke="#00f0ff" stroke-width="0.8" opacity="0.3"/>
    <line x1="570" y1="120" x2="580" y2="150" stroke="#00f0ff" stroke-width="0.8" opacity="0.3"/>
  </g>

  <!-- Bridge arrow from device to brain -->
  <g opacity="0.5">
    <line x1="580" y1="200" x2="580" y2="120" stroke="#00f0ff" stroke-width="1" stroke-dasharray="4,4"/>
    <polygon points="580,120 576,128 584,128" fill="#00f0ff"/>
  </g>

  <!-- Text - title -->
  <text x="590" y="260" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="52" font-weight="700" fill="#00f0ff" filter="url(#glowStrong)">ADVDECK</text>
  <text x="590" y="320" font-family="'SF Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="52" font-weight="700" fill="#ffb300" filter="url(#glow)">AGENT</text>

  <!-- Tagline -->
  <text x="590" y="370" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#8892b0" letter-spacing="2">POCKET AI PLANNER FOR THE CARDPUTER-ADV</text>

  <!-- Divider line -->
  <line x1="590" y1="400" x2="1180" y2="400" stroke="#ffb300" stroke-width="1" opacity="0.3"/>

  <!-- Feature tags -->
  <g font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#5a6a8a">
    <text x="590" y="435">◈ OFFLINE-FIRST</text>
    <text x="790" y="435">◈ KEYBOARD-DRIVEN</text>
    <text x="990" y="435">◈ AGENT-READY EXPORT</text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="620" width="1280" height="20" fill="#00f0ff" opacity="0.08"/>
</svg>