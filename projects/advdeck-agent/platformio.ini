; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = m5stack-cardputer
boards_dir = boards

[env:m5stack-cardputer]
platform = espressif32@^6.7.0
board = m5stack-cardputer
board_build.partitions = default_8MB.csv
board_build.variants_dir = boards
framework = arduino

; Pin numbers live in boards/pinouts/m5stack-cardputer.h, NOT as
; command-line -D flags. Defining both produces a macro-vs-const
; conflict in the Arduino core.
build_flags =
	-std=c++17
	-Iinclude
	-Isrc
	-Ithird_party/nlohmann
	-DADVDECK_FIRMWARE=1
	-DCARDPUTER=1
	-DARDUINO_USB_CDC_ON_BOOT=1
	-DARDUINO_USB_MODE=1
	-DARDUINO_RUNNING_CORE=1
	-DARDUINO_EVENT_RUNNING_CORE=1
	-DROTATION=1
	-DARDUINO_M5STACK_CARDPUTER

; Exclude the host-only IStorage impl from the firmware build: it
; includes <filesystem>, which the Arduino/ESP32 libc++ does not
; provide. The .cpp also has an #ifndef ADVDECK_FIRMWARE guard as
; defense in depth.
build_src_filter = +<*> -<.git/> -<.svn/> -<platform/host_storage.cpp>

lib_deps =
	m5stack/M5Cardputer@^1.1.1
	m5stack/M5Unified@^0.2.17
	m5stack/M5GFX@^0.2.22
	SD
